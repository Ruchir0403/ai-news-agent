name: Daily AI News

on:
  schedule:
    - cron: '30 2 * * *'   # 8 AM IST (2:30 AM UTC)
  workflow_dispatch:

jobs:
  run-news:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.10

      - name: Install dependencies
        run: |
          pip install feedparser newspaper3k transformers torch lxml_html_clean

      - name: Run script
        run: python main.py
